<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VideoSynthe - See with your ears</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: '#121212',
                        neonCyan: '#00f3ff',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #121212;
            color: white;
            overflow: hidden;
            touch-action: none; /* Prevent scroll on mobile */
        }
        
        /* Flat UI, absolutely no shadows */
        .flat-btn {
            background-color: transparent;
            border: 1px solid #00f3ff;
            color: #00f3ff;
            transition: all 0.2s ease;
        }
        .flat-btn:hover:not(:disabled) {
            background-color: #00f3ff;
            color: #121212;
        }
        .flat-btn:disabled {
            border-color: #333;
            color: #555;
            cursor: not-allowed;
        }

        .flat-solid-btn {
            background-color: #00f3ff;
            color: #121212;
            border: 1px solid #00f3ff;
            transition: all 0.2s ease;
        }
        .flat-solid-btn:hover {
            background-color: transparent;
            color: #00f3ff;
        }

        /* SVG Circular Progress without glow */
        .progress-ring__circle {
            transition: stroke-dashoffset 0.1s linear;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        /* Recording pulse flat */
        @keyframes pulseFlat {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }
        .recording-pulse {
            animation: pulseFlat 1s infinite;
            background-color: #00f3ff; /* Cyan instead of red for unified palette */
        }

        #splash-screen {
            transition: opacity 0.5s ease;
            backdrop-filter: blur(10px);
            background-color: rgba(18, 18, 18, 0.85); /* 85% opacity dark background */
        }
    </style>
</head>
<body class="w-full h-screen font-sans">

    <!-- Splash Screen overlay -->
    <div id="splash-screen" class="absolute inset-0 z-50 flex flex-col md:flex-row items-center justify-center p-8">
        <div class="flex-1 flex flex-col justify-center items-start md:pl-24 max-w-2xl">
            <img src="logo.png" alt="VideoSynthe Logo" class="w-48 h-48 mb-6 object-contain">
            <h1 class="text-5xl md:text-7xl font-extralight tracking-widest text-white mb-2 uppercase">VideoSynthe</h1>
            <p class="text-sm md:text-base font-light tracking-[0.3em] text-neonCyan mb-12 uppercase">See with your ears</p>
            
            <button id="start-btn" class="flat-solid-btn px-10 py-4 text-sm tracking-widest uppercase font-semibold">
                Start Experience
            </button>
        </div>
        <div class="flex-1 flex flex-col justify-end items-end md:pr-24 pb-8 h-full">
            <div class="text-right">
                <p class="text-xs text-gray-400 tracking-wider mb-2">Developed by</p>
                <h3 class="text-lg font-light tracking-widest text-white uppercase mb-6">David Signals</h3>
                <a href="https://www.paypal.com/paypalme/davidsignals" target="_blank" class="flat-btn px-6 py-2 text-xs tracking-wider uppercase inline-block">
                    Donate via PayPal
                </a>
            </div>
        </div>
    </div>

    <!-- Main UI container -->
    <div class="relative w-full h-full bg-darkBg overflow-hidden flex flex-col justify-end">
        
        <!-- Full Screen Video Feed -->
        <video id="camera-video" class="absolute inset-0 w-full h-full object-cover z-0" autoplay playsinline muted></video>
        
        <!-- Hidden Canvas for analysis -->
        <canvas id="analysis-canvas" class="hidden" width="64" height="64"></canvas>
        
        <!-- Top Overlay Controls -->
        <div class="absolute top-6 left-6 right-6 flex justify-between items-start z-20 pointer-events-none">
            <!-- Status text -->
            <div id="status-text" class="text-neonCyan text-xs tracking-[0.2em] uppercase font-bold px-3 py-1 border border-neonCyan bg-darkBg/50 backdrop-blur-sm pointer-events-auto">
                AWAITING
            </div>
            
            <!-- Flip Camera Button -->
            <button id="flip-camera-btn" class="flat-btn px-4 py-2 text-xs tracking-wider uppercase pointer-events-auto bg-darkBg/50 backdrop-blur-sm">
                Flip Cam
            </button>
        </div>

        <!-- Left HUD Overlay (Premium Variables Display) -->
        <div class="absolute top-24 left-6 flex flex-col space-y-4 z-20 pointer-events-none w-48">
            <div class="bg-darkBg/30 backdrop-blur-md border border-neonCyan/30 p-4 flex flex-col space-y-3">
                <div class="flex flex-col">
                    <span class="text-[9px] text-neonCyan/70 tracking-[0.2em] uppercase mb-1">LFO Wobble</span>
                    <span id="hud-wobble" class="text-white font-mono text-xs">0.00 Hz</span>
                </div>
                <div class="flex flex-col">
                    <span class="text-[9px] text-neonCyan/70 tracking-[0.2em] uppercase mb-1">FM Mod Index</span>
                    <span id="hud-mod" class="text-white font-mono text-xs">0.00</span>
                </div>
                <div class="flex flex-col">
                    <span class="text-[9px] text-neonCyan/70 tracking-[0.2em] uppercase mb-1">Harmonicity</span>
                    <span id="hud-harm" class="text-white font-mono text-xs">0.00x</span>
                </div>
                <div class="flex flex-col">
                    <span class="text-[9px] text-neonCyan/70 tracking-[0.2em] uppercase mb-1">Analog Drive</span>
                    <span id="hud-drive" class="text-white font-mono text-xs">0.00</span>
                </div>
                <div class="flex flex-col">
                    <span class="text-[9px] text-neonCyan/70 tracking-[0.2em] uppercase mb-1">Base Freq</span>
                    <span id="hud-note" class="text-white font-mono text-xs">0.00 Hz</span>
                </div>
            </div>
        </div>

        <!-- Center Overlay (Record Button) -->
        <div class="absolute inset-0 flex items-center justify-center z-20 pointer-events-none">
            <div class="flex flex-col items-center pointer-events-auto">
                <div class="relative w-32 h-32 flex items-center justify-center mb-6">
                    <svg class="absolute inset-0 w-full h-full transform -rotate-90" width="128" height="128">
                        <circle cx="64" cy="64" r="46" fill="transparent" stroke="#333" stroke-width="2"/>
                        <!-- 2 * PI * r = 2 * 3.14159 * 46 = 289 -->
                        <circle id="progress-circle" class="progress-ring__circle" cx="64" cy="64" r="46" fill="transparent" stroke="#00f3ff" stroke-width="4" stroke-dasharray="289" stroke-dashoffset="289"/>
                    </svg>
                    <!-- Clickable Inner Area -->
                    <button id="record-btn" class="w-16 h-16 rounded-full bg-transparent border-2 border-neonCyan flex items-center justify-center hover:bg-neonCyan/10 transition-colors z-10">
                        <div id="record-inner" class="w-8 h-8 rounded-full bg-neonCyan"></div>
                    </button>
                </div>

                <button id="download-audio-btn" class="hidden flat-solid-btn px-8 py-3 text-xs tracking-widest uppercase font-bold">
                    Download MP3
                </button>
            </div>
        </div>

        <!-- Bottom Overlay (Oscilloscope) -->
        <div class="relative w-full h-32 md:h-48 z-10 bg-darkBg/40 backdrop-blur-sm border-t border-neonCyan">
            <canvas id="osc-canvas" class="w-full h-full"></canvas>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script src="audio.js?v=9"></script>
    <script src="analyzer.js?v=9"></script>
    <script src="capture.js?v=9"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lamejs/1.2.1/lame.min.js"></script>
    <script src="app.js?v=9"></script>
</body>
</html>
